{% extends "base.html" %}

{% block title %}Đăng nhập - Thư viện số{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">
                    <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> Tên đăng nhập
                        </label>
                        <input type="text" class="form-control" id="username" name="username" 
                               required autofocus placeholder="Nhập tên đăng nhập">
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> Mật khẩu
                        </label>
                        <input type="password" class="form-control" id="password" name="password" 
                               required placeholder="Nhập mật khẩu">
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">
                            Ghi nhớ đăng nhập
                        </label>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-0">Chưa có tài khoản?</p>
                    <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary">
                        <i class="bi bi-person-plus"></i> Đăng ký ngay
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Additional info -->
        <div class="text-center mt-3">
            <small class="text-muted">
                <i class="bi bi-info-circle"></i> 
                Đăng nhập để mượn sách và quản lý tài khoản của bạn
            </small>
        </div>
    </div>
</div>
{% endblock %}
