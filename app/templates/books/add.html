{% extends "base.html" %}

{% block title %}Thêm sách mới - Thư viện số{% endblock %}

{% block content %}
<div class="add-book-container">
    <div class="add-book-card">
        <div class="add-book-header">
            <div class="add-book-icon">
                <i class="bi bi-book-plus"></i>
            </div>
            <h2>Thêm sách mới</h2>
            <p>Điền thông tin sách để thêm vào thư viện</p>
        </div>
        
        <form method="POST" class="add-book-form" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="isbn" class="form-label">
                            <i class="bi bi-upc-scan"></i> ISBN *
                        </label>
                        <input type="text" class="form-input" id="isbn" name="isbn" 
                               required placeholder="Nhập ISBN">
                    </div>
                    
                    <div class="form-group">
                        <label for="title" class="form-label">
                            <i class="bi bi-book"></i> Tên sách *
                        </label>
                        <input type="text" class="form-input" id="title" name="title" 
                               required placeholder="Nhập tên sách">
                    </div>
                    
                    <div class="form-group">
                        <label for="author" class="form-label">
                            <i class="bi bi-person"></i> Tác giả *
                        </label>
                        <input type="text" class="form-input" id="author" name="author" 
                               required placeholder="Nhập tên tác giả">
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="category" class="form-label">
                            <i class="bi bi-tags"></i> Thể loại *
                        </label>
                        <select class="form-select" id="category" name="category" required style="height: 60px;">
                            <option value="">Chọn thể loại</option>
                            <option value="Văn học">Văn học</option>
                            <option value="Kinh tế">Kinh tế</option>
                            <option value="Khoa học">Khoa học</option>
                            <option value="Lịch sử">Lịch sử</option>
                            <option value="Công nghệ">Công nghệ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="total_copies" class="form-label">
                            <i class="bi bi-stack"></i> Số lượng cuốn *
                        </label>
                        <input type="number" class="form-input" id="total_copies" name="total_copies" 
                               required placeholder="Nhập số lượng" min="1" value="1">
                    </div>
                    
                    <div class="form-group">
                        <label for="location" class="form-label">
                            <i class="bi bi-geo-alt"></i> Vị trí
                        </label>
                        <input type="text" class="form-input" id="location" name="location" 
                               placeholder="Ví dụ: Kệ A1">
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="publisher" class="form-label">
                            <i class="bi bi-building"></i> Nhà xuất bản
                        </label>
                        <input type="text" class="form-input" id="publisher" name="publisher" 
                               placeholder="Nhập nhà xuất bản">
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="publication_year" class="form-label">
                            <i class="bi bi-calendar"></i> Năm xuất bản
                        </label>
                        <input type="number" class="form-input" id="publication_year" name="publication_year" 
                               placeholder="Nhập năm xuất bản" min="1900" max="2030">
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description" class="form-label">
                    <i class="bi bi-text-paragraph"></i> Mô tả
                </label>
                <textarea class="form-input" id="description" name="description" rows="3" 
                          placeholder="Mô tả ngắn gọn về nội dung sách..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="image" class="form-label">
                    <i class="bi bi-image"></i> Hình ảnh bìa sách
                </label>
                <input type="file" class="form-input" id="image" name="image" 
                       accept="image/*" onchange="previewImage(this)">
                <div class="image-preview mt-2" id="imagePreview" style="display: none;">
                    <img id="previewImg" src="" alt="Preview" style="max-width: 200px; max-height: 200px; border-radius: 8px;">
                </div>
                <small class="form-text text-muted">
                    Chọn hình ảnh bìa sách (PNG, JPG, JPEG, GIF, WebP). Kích thước tối đa 16MB.
                </small>
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('books.admin_manage_books') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle"></i> Hủy
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Thêm sách
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Character counter for description
document.getElementById('description').addEventListener('input', function() {
    const maxLength = 1000;
    const currentLength = this.value.length;
    const charCount = document.getElementById('char-count');
    
    charCount.textContent = currentLength;
    
    if (currentLength > maxLength * 0.9) {
        charCount.className = 'text-warning';
    } else {
        charCount.className = '';
    }
    
    if (currentLength > maxLength) {
        charCount.className = 'text-danger';
    }
});

// Form validation
document.querySelector('form').addEventListener('submit', function(e) {
    if (!this.checkValidity()) {
        e.preventDefault();
        e.stopPropagation();
    }
    
    this.classList.add('was-validated');
});

// Auto-format ISBN
document.getElementById('isbn').addEventListener('input', function() {
    let value = this.value.replace(/[^0-9-]/g, '');
    
    // Auto-add hyphens for common ISBN formats
    if (value.length >= 3 && !value.includes('-')) {
        if (value.length === 10) {
            value = value.replace(/(\d{1})(\d{4})(\d{4})(\d{1})/, '$1-$2-$3-$4');
        } else if (value.length === 13) {
            value = value.replace(/(\d{3})(\d{1})(\d{4})(\d{4})(\d{1})/, '$1-$2-$3-$4-$5');
        }
    }
    
    this.value = value;
});

// Image preview function
function previewImage(input) {
    const preview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        
        reader.onload = function(e) {
            previewImg.src = e.target.result;
            preview.style.display = 'block';
        }
        
        reader.readAsDataURL(input.files[0]);
    } else {
        preview.style.display = 'none';
    }
}
</script>
{% endblock %}
