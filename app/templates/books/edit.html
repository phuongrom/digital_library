{% extends "base.html" %}

{% block title %}Chỉnh sửa sách - Thư viện số{% endblock %}

{% block content %}
<div class="edit-book-container">
    <div class="edit-book-card">
        <div class="edit-book-header">
            <div class="edit-book-icon">
                <i class="bi bi-pencil-square"></i>
            </div>
            <h2>Chỉnh sửa sách</h2>
            <p>Cập nhật thông tin sách "{{ book.title }}"</p>
        </div>
        
        <form method="POST" class="edit-book-form">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="isbn" class="form-label">
                            <i class="bi bi-upc-scan"></i> ISBN *
                        </label>
                        <input type="text" class="form-input" id="isbn" name="isbn" 
                               value="{{ book.isbn }}" required placeholder="Nhập ISBN">
                    </div>
                    
                    <div class="form-group">
                        <label for="title" class="form-label">
                            <i class="bi bi-book"></i> Tên sách *
                        </label>
                        <input type="text" class="form-input" id="title" name="title" 
                               value="{{ book.title }}" required placeholder="Nhập tên sách">
                    </div>
                    
                    <div class="form-group">
                        <label for="author" class="form-label">
                            <i class="bi bi-person"></i> Tác giả *
                        </label>
                        <input type="text" class="form-input" id="author" name="author" 
                               value="{{ book.author }}" required placeholder="Nhập tên tác giả">
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="category" class="form-label">
                            <i class="bi bi-tags"></i> Thể loại *
                        </label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Chọn thể loại</option>
                            <option value="Văn học" {% if book.category == 'Văn học' %}selected{% endif %}>Văn học</option>
                            <option value="Kinh tế" {% if book.category == 'Kinh tế' %}selected{% endif %}>Kinh tế</option>
                            <option value="Khoa học" {% if book.category == 'Khoa học' %}selected{% endif %}>Khoa học</option>
                            <option value="Lịch sử" {% if book.category == 'Lịch sử' %}selected{% endif %}>Lịch sử</option>
                            <option value="Công nghệ" {% if book.category == 'Công nghệ' %}selected{% endif %}>Công nghệ</option>
                            <option value="Khác" {% if book.category == 'Khác' %}selected{% endif %}>Khác</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="total_copies" class="form-label">
                            <i class="bi bi-stack"></i> Số lượng cuốn *
                        </label>
                        <input type="number" class="form-input" id="total_copies" name="total_copies" 
                               value="{{ book.total_copies }}" required placeholder="Nhập số lượng" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label for="location" class="form-label">
                            <i class="bi bi-geo-alt"></i> Vị trí
                        </label>
                        <input type="text" class="form-input" id="location" name="location" 
                               value="{{ book.location or '' }}" placeholder="Ví dụ: Kệ A1">
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="publisher" class="form-label">
                            <i class="bi bi-building"></i> Nhà xuất bản
                        </label>
                        <input type="text" class="form-input" id="publisher" name="publisher" 
                               value="{{ book.publisher or '' }}" placeholder="Nhập nhà xuất bản">
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="publication_year" class="form-label">
                            <i class="bi bi-calendar"></i> Năm xuất bản
                        </label>
                        <input type="number" class="form-input" id="publication_year" name="publication_year" 
                               value="{{ book.publication_year or '' }}" placeholder="Nhập năm xuất bản" min="1900" max="2030">
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description" class="form-label">
                    <i class="bi bi-text-paragraph"></i> Mô tả
                </label>
                <textarea class="form-input" id="description" name="description" rows="3" 
                          placeholder="Mô tả ngắn gọn về nội dung sách...">{{ book.description or '' }}</textarea>
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('books.admin_manage_books') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle"></i> Hủy
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Cập nhật sách
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
