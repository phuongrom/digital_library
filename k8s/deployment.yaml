apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-library
  labels:
    app: digital-library
spec:
  replicas: 3
  selector:
    matchLabels:
      app: digital-library
  template:
    metadata:
      labels:
        app: digital-library
    spec:
      containers:
      - name: digital-library
        image: your-registry/digital-library:latest
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: digital-library-service
spec:
  selector:
    app: digital-library
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
